version: "2026504"             # 如果發佈，請確保每次改動陞版本號

# sort:                      # 字典初始排序，可選`original`或`by_weight`
# use_preset_vocabulary:     # 是否引入「八股文」〔含字詞頻、詞庫〕
# vocabulary:                # 引入其他詞庫〔含字詞頻、詞庫〕 (use_preset_vocabulary 不可設定為 true)
# max_phrase_length:         # 配合`use_preset_vocabulary:`，設定導入詞條最大詞長
# min_phrase_weight:         # 配合`use_preset_vocabulary:`，設定導入詞條最小詞頻
# columns:                   # 定義碼表以`Tab`分隔出的各列，可設`text`【文本】、`code`【碼】、`weight`【權重】、`stem`【造詞碼】
  # - text #第一列字／詞
  # - code #第二列碼
  # - weight #第三列字／詞頻
  # - stem #第四列造詞碼
# import_tables:             # 加載其它外部碼表
# encoder:                   # 形碼造詞規則
  # exclude_patterns:          #
  # rules:                     # 可用`length_equal:`和`length_in_range:`定義。大寫字母表示字序，小寫字母表示其所跟隨的大寫字母所以表的字中的編碼序
  # tail_anchor:               # 造詞碼包含結構分割符〔僅用於倉頡〕
  # exclude_patterns:          # 取消某編碼的造詞資格
