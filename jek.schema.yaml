speller:               # 衹於 ascii 且與 "punctuator" 衝突
  alphabet: zyxwvutsrqponmlkjihgfedcba  # 碼表射鍵入，是反字母矢  # 定義本方案輸入鍵
  # initials: # 定義僅作始碼之鍵
  # finals: # 定義僅作末碼之鍵
  delimiter: " '"
    # 隔音符號用「'」；第一位的空白用來自動插入到音節邊界處  # 上屛時的音節間分音符
